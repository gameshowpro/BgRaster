# $schema: https://raw.githubusercontent.com/gameshowpro/BgRaster/refs/heads/main/docs/schemas/bgraster-config.schema.json
# This sample is used to generate the background for the social card during the build process. It's not really part of the documentation.
[text]
format = ["BgRaster<br>", "Desktop generator for<br>", "display mapping"]
size = ["15vh", "10vh", "10vh"]
color = ["#FFFFFF"]
x = ["50vw"]
y = ["65vh"]

[logo]
x = ["50vw"]
y = ["25vh"]
width = ["40vw"]
height = ["40vh"]

[background]
color = ["#0E5800"]

[grid]
odd-color = ["#128000"]

[circle]
size = ["100vmin"]
color = ["#73008680"]
stroke = ["2"]

[crosshair]
stroke = ["0"]

########### Everything from here ownwards is for sample-building purposes. 
########### Remove this is you're copying this sample to a production-ready config file.
[render]
no-assignment = true
no-discovery = true
output = "{index}"

[[output]]

[output.hardware_output]
index = 0
desktopX = 0
desktopY = 0
widthPx = 1200
heightPx = 630
dpiX = 96
dpiY = 96
rotation = 0
adapterName = "Facebook"
friendlyName = ""

[[output]]

[output.hardware_output]
index = 1
desktopX = 0
desktopY = 0
widthPx = 1200
heightPx = 600
dpiX = 96
dpiY = 96
rotation = 0
adapterName = "X"
friendlyName = ""

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: windows-latest
    outputs:
      docs_tag: ${{ steps.docs_version.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install NBGV
        run: dotnet tool install --global nbgv

      - name: Set version
        run: nbgv cloud

      - name: Capture docs version
        id: docs_version
        shell: pwsh
        run: |
          $versionInfo = nbgv get-version -f json | ConvertFrom-Json
          $version = [string]$versionInfo.SimpleVersion
          $isPublicRelease = [bool]$versionInfo.PublicRelease

          if ("${{ github.event_name }}" -eq "push" -and "${{ github.ref }}" -eq "refs/heads/main" -and -not $isPublicRelease) {
            throw "NBGV reported PublicRelease=false for main. Check version.json publicReleaseRefSpec before publishing releases."
          }

          if ($version.Contains('+') -or $version.Contains('-')) {
            throw "Stable release version expected, but got '$version'. Pre-release/build-metadata suffixes are not allowed."
          }

          "tag=v$version" >> $env:GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore src/BgRaster.slnx -r win-x64

      - name: Build
        run: dotnet build src/BgRaster.slnx -c Release --no-restore /p:TreatWarningsAsErrors=true

      - name: Test
        run: >
          dotnet test tests/BgRaster.Tests/BgRaster.Tests.csproj
          -c Release
          --no-build
          --logger "trx;LogFileName=test-results.trx"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install MkDocs
        run: |
          python -m pip install --upgrade pip
          pip install -r docs/requirements.txt

      - name: Generate documentation assets
        shell: pwsh
        run: ./scripts/generate-documentation.ps1

      - name: Validate docs version tag
        shell: pwsh
        run: |
          $tag = "${{ steps.docs_version.outputs.tag }}"
          if ([string]::IsNullOrWhiteSpace($tag)) {
            throw "docs_version output 'tag' is empty. Refusing to build documentation without an explicit version."
          }
          if (-not $tag.StartsWith('v', [System.StringComparison]::Ordinal)) {
            throw "docs_version output 'tag' must start with 'v'. Actual: '$tag'"
          }
          Write-Host "Using documentation build tag: $tag"

      - name: Build docs site
        env:
          BGRASTER_DOCS_VERSION: ${{ steps.docs_version.outputs.tag }}
        run: mkdocs build --strict

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Publish AOT
        run: >
          dotnet publish src/BgRaster.csproj
          -c Release
          -r win-x64
          /p:TreatWarningsAsErrors=true
          -o publish/win-x64

      - name: Stage release files
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: pwsh
        run: |
          $publishDir = Join-Path $PWD 'publish/win-x64'
          $releaseDir = Join-Path $PWD 'publish/release'
          New-Item -ItemType Directory -Path $releaseDir -Force | Out-Null

          Copy-Item -Path (Join-Path $publishDir 'GameshowPro.BgRaster.exe') -Destination (Join-Path $releaseDir 'BgRaster.exe') -Force
          Copy-Item -Path (Join-Path $publishDir 'libSkiaSharp.dll') -Destination (Join-Path $releaseDir 'libSkiaSharp.dll') -Force
          Copy-Item -Path (Join-Path $publishDir 'GameshowPro.BgRaster.pdb') -Destination (Join-Path $releaseDir 'BgRaster.pdb') -Force

          $zipPath = Join-Path $PWD 'publish/BgRaster.zip'
          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }

          Compress-Archive -Path (Join-Path $releaseDir '*') -DestinationPath $zipPath -Force

      - name: Smoke test published binary
        shell: pwsh
        run: >
          ./scripts/run-publish-smoke-test.ps1
          -SkipPublish
          -PublishDir publish/win-x64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BgRaster-win-x64
          path: publish/win-x64/
          if-no-files-found: error

      - name: Upload release zip
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: BgRaster-zip
          path: publish/BgRaster.zip
          if-no-files-found: error

      - name: Upload release symbols
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: BgRaster-pdb
          path: publish/release/BgRaster.pdb
          if-no-files-found: error

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: tests/BgRaster.Tests/TestResults/test-results.trx

      - name: Tag version on push to main
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: pwsh
        run: |
          $tag = "${{ steps.docs_version.outputs.tag }}"
          if ([string]::IsNullOrWhiteSpace($tag)) {
            throw "docs_version output 'tag' is empty."
          }

          $exists = git ls-remote --tags origin "refs/tags/$tag"
          if ([string]::IsNullOrWhiteSpace($exists)) {
            git tag "$tag"
            git push origin "$tag"
            Write-Host "Created and pushed tag $tag"
          }
          else {
            Write-Host "Tag $tag already exists on origin; skipping tag creation."
          }

      - name: Create or update GitHub release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.docs_version.outputs.tag }}
          name: BgRaster ${{ steps.docs_version.outputs.tag }}
          generate_release_notes: true
          files: |
            publish/BgRaster.zip
            publish/release/BgRaster.pdb
          fail_on_unmatched_files: true

  deploy-docs:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: windows-latest
    outputs:
      docs_tag: ${{ steps.docs_version.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Install NBGV and set version variables
        uses: dotnet/nbgv@v0.5.2
        with:
          setAllVars: true

      - name: Validate release version
        shell: pwsh
        run: |
          $version = [string]$env:NBGV_SimpleVersion
          $isPublicRelease = [bool]::Parse($env:NBGV_PublicRelease)

          if ("${{ github.event_name }}" -eq "push" -and "${{ github.ref }}" -eq "refs/heads/main" -and -not $isPublicRelease) {
            throw "NBGV reported PublicRelease=false for main. Check version.json publicReleaseRefSpec before publishing releases."
          }

          if ($version.Contains('+') -or $version.Contains('-')) {
            throw "Stable release version expected, but got '$version'. Pre-release/build-metadata suffixes are not allowed."
          }

          "tag=v$version" >> $env:GITHUB_OUTPUT
        id: docs_version

      - name: Capture Chocolatey version
        shell: pwsh
        run: |
          "version=$env:NBGV_ChocolateyPackageVersion" >> $env:GITHUB_OUTPUT
          "copyrightYear=$([string](Get-Date).Year)" >> $env:GITHUB_OUTPUT
        id: choco_version

      - name: Restore
        run: dotnet restore src/BgRaster.slnx -r win-x64

      - name: Build
        run: dotnet build tests/BgRaster.Tests/BgRaster.Tests.csproj -c Release --no-restore -r win-x64 /p:TreatWarningsAsErrors=true

      - name: Test
        run: >
          dotnet test tests/BgRaster.Tests/BgRaster.Tests.csproj -r win-x64
          -c Release
          --no-build
          --logger "trx;LogFileName=test-results.trx"

      - name: Generate documentation assets
        shell: pwsh
        run: ./scripts/generate-documentation.ps1

      - name: Upload docs source
        uses: actions/upload-artifact@v5
        with:
          name: docs-source
          path: |
            mkdocs.yml
            docs/
            overrides/
          if-no-files-found: error

      - name: Publish AOT
        run: >
          dotnet publish src/BgRaster.csproj
          -c Release
          -r win-x64
          /p:TreatWarningsAsErrors=true
          -o publish/win-x64

      - name: Gather Chocolatey package files
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: pwsh
        env:
          CHOCO_ASSETS_PATH: build/chocolatey/BgRaster
          BINARIES_PATH: publish/win-x64
          TOOLS_PATH: package/tools
          NUSPEC_PATH: package/BgRaster.nuspec
        run: |
          $version = "${{ steps.choco_version.outputs.version }}"
          $copyrightYear = "${{ steps.choco_version.outputs.copyrightYear }}"

          mkdir $env:TOOLS_PATH -Force | Out-Null

          # Token-replace the nuspec
          (Get-Content (Join-Path $env:CHOCO_ASSETS_PATH 'publish.nuspec') -Raw) `
            -replace '\$version\$', $version `
            -replace '\$packageId\$', 'BgRaster' `
            -replace '\$copyrightYear\$', $copyrightYear |
            Set-Content $env:NUSPEC_PATH -NoNewline

          # Copy install script to tools directory
          Copy-Item (Join-Path $env:CHOCO_ASSETS_PATH 'chocolateyinstall.ps1') -Destination $env:TOOLS_PATH

          # Append SHA256 hashes to VERIFICATION.txt, then copy to binaries
          $verificationPath = Join-Path $env:CHOCO_ASSETS_PATH 'VERIFICATION.txt'
          $files = Get-ChildItem -Path $env:BINARIES_PATH -File
          Add-Content -Path $verificationPath -Value "`nchecksum type: sha256"
          foreach ($file in $files) {
            $checksum = Get-FileHash -Path $file.FullName -Algorithm SHA256 | Select-Object -ExpandProperty Hash
            $relativePath = Resolve-Path -Path $file.FullName -RelativeBasePath $env:BINARIES_PATH -Relative
            Add-Content -Path $verificationPath -Value "`nfile: $relativePath`nchecksum: $checksum"
          }

          Get-ChildItem -Path $env:CHOCO_ASSETS_PATH -Include '*.txt' |
            Copy-Item -Destination $env:BINARIES_PATH -Force

      - name: Pack Chocolatey nupkg
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: pwsh
        run: |
          $version = "${{ steps.choco_version.outputs.version }}"
          New-Item -Path packages -ItemType Directory -Force | Out-Null
          choco pack package/BgRaster.nuspec --version $version --outputdirectory packages
          if ($LASTEXITCODE -ne 0) { throw "choco pack failed" }

          $nupkg = (Get-ChildItem -Path "packages\*.nupkg" | Select-Object -First 1).FullName
          "path=$nupkg" >> $env:GITHUB_OUTPUT
        id: pack_nupkg

      - name: Stage release files
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: pwsh
        run: |
          $publishDir = Join-Path $PWD 'publish/win-x64'
          $releaseDir = Join-Path $PWD 'publish/release'
          $zipDir = Join-Path $releaseDir 'zip'
          New-Item -ItemType Directory -Path $releaseDir -Force | Out-Null
          New-Item -ItemType Directory -Path $zipDir -Force | Out-Null

          Copy-Item -Path (Join-Path $publishDir 'GameshowPro.BgRaster.exe') -Destination (Join-Path $zipDir 'BgRaster.exe') -Force
          Copy-Item -Path (Join-Path $publishDir 'libSkiaSharp.dll') -Destination (Join-Path $zipDir 'libSkiaSharp.dll') -Force
          Copy-Item -Path (Join-Path $publishDir 'GameshowPro.BgRaster.pdb') -Destination (Join-Path $releaseDir 'BgRaster.pdb') -Force

          $zipPath = Join-Path $PWD 'publish/BgRaster.zip'
          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }

          Compress-Archive -Path (Join-Path $zipDir '*') -DestinationPath $zipPath -Force

      - name: Smoke test published binary
        shell: pwsh
        run: >
          ./scripts/run-publish-smoke-test.ps1
          -SkipPublish
          -PublishDir publish/win-x64

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: BgRaster-win-x64
          path: publish/win-x64/
          if-no-files-found: error

      - name: Upload release zip
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v5
        with:
          name: BgRaster-zip
          path: publish/BgRaster.zip
          if-no-files-found: error

      - name: Upload release symbols
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v5
        with:
          name: BgRaster-pdb
          path: publish/release/BgRaster.pdb
          if-no-files-found: error

      - name: Upload test results
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: test-results
          path: tests/BgRaster.Tests/TestResults/test-results.trx

      - name: Tag version on push to main
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: pwsh
        run: |
          $tag = "${{ steps.docs_version.outputs.tag }}"
          if ([string]::IsNullOrWhiteSpace($tag)) {
            throw "docs_version output 'tag' is empty."
          }

          $exists = git ls-remote --tags origin "refs/tags/$tag"
          if ([string]::IsNullOrWhiteSpace($exists)) {
            git tag "$tag"
            git push origin "$tag"
            Write-Host "Created and pushed tag $tag"
          }
          else {
            Write-Host "Tag $tag already exists on origin; skipping tag creation."
          }

      - name: Create or update GitHub release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.docs_version.outputs.tag }}
          name: BgRaster ${{ steps.docs_version.outputs.tag }}
          generate_release_notes: true
          files: |
            publish/BgRaster.zip
            publish/release/BgRaster.pdb
            ${{ steps.pack_nupkg.outputs.path }}
          fail_on_unmatched_files: true

  build-docs:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download docs source
        uses: actions/download-artifact@v5
        with:
          name: docs-source

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install Cairo system library
        run: sudo apt-get update && sudo apt-get install -y libcairo2

      - name: Install MkDocs
        run: |
          python -m pip install --upgrade pip
          pip install -r docs/requirements.txt

      - name: Validate docs version tag
        shell: pwsh
        run: |
          $tag = "${{ needs.build.outputs.docs_tag }}"
          if ([string]::IsNullOrWhiteSpace($tag)) {
            throw "docs_tag is empty. Refusing to build documentation without an explicit version."
          }
          if (-not $tag.StartsWith('v', [System.StringComparison]::Ordinal)) {
            throw "docs_tag must start with 'v'. Actual: '$tag'"
          }
          Write-Host "Using documentation build tag: $tag"

      - name: Build docs site
        env:
          BGRASTER_DOCS_VERSION: ${{ needs.build.outputs.docs_tag }}
        run: |
          echo "Building docs with BGRASTER_DOCS_VERSION=${BGRASTER_DOCS_VERSION}"
          mkdocs build --strict

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy-docs:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build-docs
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

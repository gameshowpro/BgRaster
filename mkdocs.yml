site_name: BgRaster
site_description: Generate informative test pattern wallpapers for AV, Broadcast, and Events industries. Inspired by BgInfo. 
site_url: https://bgraster.gameshow.pro/
repo_url: https://github.com/gameshowpro/BgRaster
repo_name: gameshowpro/BgRaster

theme:
  name: material
  custom_dir: docs/overrides
  logo: assets/images/favicon.svg
  favicon: assets/images/favicon.svg
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  features:
    - navigation.instant
    - search.suggest
    - search.highlight
    - content.code.copy

extra_css:
  - assets/stylesheets/extra.css

docs_dir: docs
use_directory_urls: true
edit_uri: edit/main/docs/
exclude_docs: |
  plan.md
not_in_nav: |
  generated/**

nav:
  - Home: index.md
  - Features: features.md
  - TOML Schema: toml-schema.md
  - CLI Schema: cli-schema.md
  - Troubleshooting: troubleshooting.md
  - Developer:
      - Architecture: developer/architecture.md
      - Config File Logic: developer/config-file-logic.md
      - Coding Standards: developer/coding-standards.md
      - Deployment: developer/deployment.md
      - Deferred Tasks: developer/future-plans.md
      - Documentation Generator: developer/documentation-generator.md

markdown_extensions:
  - pymdownx.snippets:
      base_path: docs
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - toc:
      permalink: true

plugins:
  - search

hooks:
  - docs/hooks/og_image.py

extra:
  version: !ENV [BGRASTER_DOCS_VERSION]
  generator: false

copyright: © 2026 Barjonas LLC
